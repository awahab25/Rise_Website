<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Royal Rice Mills</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .details-hero {
            background: var(--bg-light);
            padding: 120px 0 60px;
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: start;
        }
        .main-image-wrap {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-medium);
            border: 1px solid #eee;
            aspect-ratio: 4/3;
        }
        .main-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .p-brand-overlay {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(11,61,46,0.88); color: var(--secondary-color);
            font-size: 0.75rem; font-weight: 700; padding: 6px 15px;
            border-radius: 6px; letter-spacing: 1.5px; border: 1px solid var(--secondary-color);
        }
        
        .p-cat-tag {
            background: var(--primary-color); color: var(--secondary-color);
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            margin-bottom: 15px;
        }
        .p-title-lg { font-size: 2.5rem; color: var(--primary-color); margin-bottom: 15px; }
        .p-price-label { font-size: 1.2rem; font-weight: 600; color: var(--text-dark); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .p-price-label span { font-size: 0.85rem; color: var(--text-muted); font-weight: 400; }
        
        .specs-table {
            width: 100%; border-collapse: collapse; margin: 30px 0;
            background: white; border-radius: 8px; overflow: hidden;
            box-shadow: var(--shadow-soft);
        }
        .specs-table td { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
        .specs-table td:first-child { font-weight: 700; color: var(--primary-color); width: 40%; background: #fafafa; }

        .packing-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .pack-tag {
            border: 1.5px solid #ddd; padding: 8px 18px; border-radius: 6px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .pack-tag.active { border-color: var(--secondary-color); background: #fffdf5; color: var(--primary-color); }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .related-section { padding: 80px 0; background: white; border-top: 1px solid #eee; }
        .related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }

        @media (max-width: 992px) {
            .details-grid { grid-template-columns: 1fr; gap: 40px; }
            .related-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="details-hero">
        <div class="container" id="product-details-content">
            <!-- Loading State -->
            <div style="text-align:center; padding: 100px 0;" id="loading">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary-color);"></i>
                <p style="margin-top: 20px; color: var(--text-muted);">Loading product details...</p>
            </div>
        </div>
    </div>

    <section class="related-section">
        <div class="container">
            <h2 class="section-title centered">Related Rice Varieties</h2>
            <div class="related-grid" id="related-products"></div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="js/components.js"></script>
    <script>
        const PRODUCTS = [
            { id: "super-kernel-basmati", name: "Super Kernel Basmati Rice", category: "Basmati", type: "Raw", image: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&q=80&w=800", description: "Pakistan's finest extra-long grain basmati with exceptional aroma and fluffy texture after cooking. Known for its distinct fragrance and non-sticky quality.", specs: { length: "8.0–8.4 mm", broken: "Max 2%", purity: "99%+", moisture: "12-13% Max", drying: "Sun Dried / Mechanical" }, packing: ["1kg", "2kg", "5kg", "10kg", "25kg", "50kg"] },
            { id: "1121-basmati-white", name: "1121 Basmati White Rice", category: "Basmati", type: "Raw", image: "https://images.unsplash.com/photo-1536679545597-c2e5e1946495?auto=format&fit=crop&q=80&w=800", description: "World's longest grain basmati, known for extraordinary elongation after cooking and premium aroma. Preferred for luxury dining and gourmet recipes.", specs: { length: "8.2–8.6 mm", broken: "Max 2%", purity: "99%+", moisture: "12-13% Max", drying: "Mechanical" }, packing: ["1kg", "5kg", "10kg", "25kg", "50kg"] },
            { id: "basmati-sella-gold", name: "Basmati Sella (Gold)", category: "Basmati", type: "Sella", image: "https://images.unsplash.com/photo-1591814468924-caf88d1232e1?auto=format&fit=crop&q=80&w=800", description: "Parboiled basmati rice with golden color, non-sticky grains and excellent elongation ratio. Perfect for commercial use and large catering events.", specs: { length: "7.5–8.0 mm", broken: "Max 3%", purity: "98%+", moisture: "12% Max", drying: "Steam Processed" }, packing: ["1kg", "2kg", "5kg", "10kg", "25kg", "50kg"] },
            { id: "irri-6-white", name: "IRRI-6 White Rice", category: "IRRI", type: "Raw", image: "https://images.unsplash.com/photo-1569050467447-ce54b3bbc37d?auto=format&fit=crop&q=80&w=800", description: "Most popular non-basmati long grain rice from Pakistan, ideal for everyday consumption worldwide. Exported in bulk to Middle East and Africa.", specs: { length: "6.4–6.8 mm", broken: "5%/10%/25%", purity: "95%+", moisture: "14% Max", drying: "Sun Dried" }, packing: ["5kg", "10kg", "25kg", "50kg"] },
            { id: "irri-9-white", name: "IRRI-9 White Rice", category: "IRRI", type: "Raw", image: "https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&q=80&w=800", description: "Medium grain non-basmati rice with good cooking quality and competitive pricing for bulk markets.", specs: { length: "6.0–6.4 mm", broken: "Max 5%", purity: "95%+", moisture: "14% Max", drying: "Sun Dried" }, packing: ["5kg", "10kg", "25kg", "50kg"] },
            { id: "pk-385-basmati", name: "PK-385 Basmati Rice", category: "Basmati", type: "Raw", image: "https://images.unsplash.com/photo-1591814468924-caf88d1232e1?auto=format&fit=crop&q=80&w=800", description: "Classic aromatic basmati variety with superior taste and affordable pricing for global exports.", specs: { length: "6.8–7.2 mm", broken: "Max 2%", purity: "98%+", moisture: "13% Max", drying: "Sun Dried" }, packing: ["1kg", "5kg", "10kg", "25kg", "50kg"] },
            { id: "brown-rice", name: "Premium Brown Rice", category: "Specialty", type: "Raw", image: "https://images.unsplash.com/photo-1574484284002-952d92456975?auto=format&fit=crop&q=80&w=800", description: "Unpolished whole grain rice, high in fiber and nutrients. Retains the outer bran layer for health benefits.", specs: { length: "7.0–7.4 mm", broken: "Max 5%", purity: "99%+", moisture: "12% Max", drying: "Natural" }, packing: ["1kg", "2kg", "5kg", "25kg"] },
            { id: "steam-basmati", name: "Steam Basmati Rice", category: "Basmati", type: "Steam", image: "https://images.unsplash.com/photo-1536679545597-c2e5e1946495?auto=format&fit=crop&q=80&w=800", description: "Lightly steamed basmati rice with improved texture, reduced starch, and perfect for biryani dishes.", specs: { length: "7.5–8.0 mm", broken: "Max 2%", purity: "98%+", moisture: "12% Max", drying: "Steam Processed" }, packing: ["1kg", "5kg", "10kg", "25kg", "50kg"] },
            { id: "broken-rice", name: "A-Grade Broken Rice", category: "Specialty", type: "Raw", image: "https://images.unsplash.com/photo-1501265976582-c1e1b0bbaf63?auto=format&fit=crop&q=80&w=800", description: "High quality broken rice grains, suitable for rice flour, cereals, and industrial food production.", specs: { length: "Fragments", broken: "100%", purity: "95%+", moisture: "14% Max", drying: "N/A" }, packing: ["25kg", "50kg"] },
            { id: "c9-specialty", name: "C9 Specialty Rice", category: "Specialty", type: "Raw", image: "https://images.unsplash.com/photo-1569050467447-ce54b3bbc37d?auto=format&fit=crop&q=80&w=800", description: "A unique hybrid variety offering a balance between long grain and superior cooking consistency.", specs: { length: "6.8–7.0 mm", broken: "Max 5%", purity: "97%+", moisture: "13% Max", drying: "Mechanical" }, packing: ["10kg", "25kg", "50kg"] }
        ];
        (function() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id') || 'super-kernel-basmati';
            const product = PRODUCTS.find(p => p.id === productId);

            const container = document.getElementById('product-details-content');
            
            if (!product) {
                container.innerHTML = `
                    <div style="text-align:center; padding:100px 0;">
                        <h2>Product Not Found</h2>
                        <p>The product you are looking for does not exist.</p>
                        <a href="products.html" class="btn btn-green" style="margin-top:20px;">Back to Catalog</a>
                    </div>`;
                return;
            }

            // Render Product Details
            container.innerHTML = `
                <div class="details-grid">
                    <div class="main-image-wrap">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&q=80&w=800'">
                        <span class="p-brand-overlay">Royal Rice Mills</span>
                    </div>
                    <div>
                        <span class="p-cat-tag">${product.category} Rice</span>
                        <h1 class="p-title-lg">${product.name}</h1>
                        <p class="p-price-label"><i class="fas fa-tag" style="color:var(--secondary-color);"></i> Direct Mill Price <span>(Contact for current rates)</span></p>
                        <p style="color:var(--text-muted); line-height:1.7; margin-bottom:20px;">${product.description}</p>
                        
                        <table class="specs-table">
                            <tr><td>Grain Length</td><td>${product.specs.length}</td></tr>
                            <tr><td>Broken Percentage</td><td>${product.specs.broken}</td></tr>
                            <tr><td>Purity / Admixture</td><td>${product.specs.purity}</td></tr>
                            <tr><td>Moisture Content</td><td>${product.specs.moisture}</td></tr>
                            <tr><td>Drying Process</td><td>${product.specs.drying}</td></tr>
                        </table>

                        <h4 style="margin-bottom:15px; font-size:1rem; color:var(--primary-color);">Available Packaging</h4>
                        <div class="packing-tags">
                            ${product.packing.map(p => `<span class="pack-tag">${p}</span>`).join('')}
                        </div>

                        <div class="action-btns">
                            <a href="quote.html?id=${product.id}" class="btn btn-gold" style="text-align:center;">Request Quote</a>
                            <a href="https://wa.me/923443004914?text=I am interested in ${encodeURIComponent(product.name)}" class="btn btn-green" style="text-align:center;">
                                <i class="fab fa-whatsapp"></i> WhatsApp Inquiry
                            </a>
                        </div>
                    </div>
                </div>
            `;

            // Render Related Products
            const relatedContainer = document.getElementById('related-products');
            const related = PRODUCTS.filter(p => p.id !== product.id).slice(0, 4);
            
            related.forEach(p => {
                relatedContainer.innerHTML += `
                <div class="card p-card">
                    <div style="position:relative; overflow:hidden;">
                        <img src="${p.image}" alt="${p.name}" style="height:200px; width:100%; object-fit:cover;" onerror="this.src='https://images.unsplash.com/photo-1586201375761-83865001e31c?auto=format&fit=crop&q=80&w=800'">
                        <span style="position:absolute; bottom:10px; right:10px; background:rgba(11,61,46,0.8); color:#c9a227; font-size:0.6rem; padding:3px 8px; border-radius:4px; border:1px solid #c9a227;">Royal Rice Mills</span>
                    </div>
                    <div class="p-info text-center" style="padding:15px;">
                        <h3 style="font-size:0.95rem; margin-bottom:10px;">${p.name}</h3>
                        <a href="product-details.html?id=${p.id}" class="btn btn-outline-green btn-sm" style="width:100%;">View Details</a>
                    </div>
                </div>`;
            });
        })();
    </script>
</body>
</html>
